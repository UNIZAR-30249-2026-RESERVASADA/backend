name: reservas-ada

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: reservas_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - reservas_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: reservas_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - reservas_net

  geo-server:
    build:
      context: ./geo-server
      dockerfile: Dockerfile
    container_name: reservas_pygeoapi
    ports:
      - "5000:5000"
    environment:
      PYGEOAPI_CONFIG: /app/pygeoapi-config.yml
      PYGEOAPI_OPENAPI: /app/openapi.yml
    volumes:
      - ./data/espacios_geojson:/data/espacios_geojson:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reservas_net

  app-server:
    build:
      context: ./app-server
      dockerfile: Dockerfile
    container_name: reservas_app_server
    environment:
      APP_SERVER_PORT: "4000"
      DB_HOST:         postgres
      DB_PORT:         "5432"
      DB_NAME:         ${POSTGRES_DB}
      DB_USER:         ${POSTGRES_USER}
      DB_PASSWORD:     ${POSTGRES_PASSWORD}
      RABBITMQ_URL:    amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      REQUEST_QUEUE:   ${REQUEST_QUEUE}
      RESPONSE_QUEUE:  ${RESPONSE_QUEUE}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./data/espacios_geojson:/data/espacios_geojson:ro
    networks:
      - reservas_net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: reservas_gateway
    environment:
      GATEWAY_PORT:   "3000"
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RABBITMQ_URL:   amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      REQUEST_QUEUE:  ${REQUEST_QUEUE}
      RESPONSE_QUEUE: ${RESPONSE_QUEUE}
      GEO_SERVER_URL: http://geo-server:5000
    depends_on:
      rabbitmq:
        condition: service_healthy
      app-server:
        condition: service_started
      geo-server:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - reservas_net

volumes:
  pgdata:

networks:
  reservas_net:
    driver: bridge