name: Backend CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-app-server:
    name: Test app-server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app-server

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-server/package-lock.json

      - name: Instalar dependencias app-server
        run: npm ci

      - name: Ejecutar tests app-server
        run: npm run test:coverage

  test-gateway:
    name: Test gateway
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./gateway

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Instalar dependencias gateway
        run: npm ci

      - name: Ejecutar tests gateway
        run: npm run test:coverage
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
